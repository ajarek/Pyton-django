{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md mt-10">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Rejestracja</h2>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded hover:bg-indigo-700 transition duration-300 mt-4">Zarejestruj</button>
    </form>
    <div class="mt-4 text-center">
        <p class="text-sm text-gray-600">Masz już konto? <a href="{% url 'login' %}" class="text-indigo-600 hover:underline">Zaloguj się</a></p>
    </div>
</div>
{% endblock %}
