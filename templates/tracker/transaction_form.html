{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="max-w-xl mx-auto bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">
        {% if form.instance.pk %}Edytuj transakcję{% else %}Dodaj nową transakcję{% endif %}
    </h2>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="mt-6 flex justify-end space-x-3">
            <a href="{% url 'dashboard' %}" class="bg-gray-200 text-gray-700 py-2 px-4 rounded hover:bg-gray-300 transition">Anuluj</a>
            <button type="submit" class="bg-indigo-600 text-white font-bold py-2 px-4 rounded hover:bg-indigo-700 transition">Zapisz</button>
        </div>
    </form>
</div>
{% endblock %}
